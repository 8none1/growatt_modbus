services:
  growatt_modbus:
    # Prebuilt multi-arch image published to GitHub Container Registry by CI.
    # To build locally instead, see "Build it yourself" in the README.
    image: ghcr.io/8none1/growatt_modbus:latest
    container_name: growatt_modbus
    network_mode: host  # Host networking: access LAN, host DNS
    volumes:
      - /etc/resolv.conf:/etc/resolv.conf:ro  # Ensure it uses host DNS
      - ./config:/config:ro                   # Mount config.yaml at /config/config.yaml
    restart: unless-stopped
    environment:
      - TZ=Europe/London
      # - LOG_LEVEL=DEBUG
      # - MQTT_BROKER=192.168.0.10
      # - MQTT_USERNAME=growatt
      # - MQTT_PASSWORD=secret
