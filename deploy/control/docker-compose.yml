# Inverter-control service: the baked CGI image on port 8085.
# Home Assistant rest_commands POST to http://<host>:8085/cgi-bin/switch_inverter_mode.py
#
# Shares the SAME config.yaml as the poller. On perceptron, point the config mount
# at the poller's config (e.g. ../growatt_modbus/config) so there is one source of truth.
services:
  growatt_control:
    image: ghcr.io/8none1/growatt_modbus-control:latest
    container_name: growatt_control
    ports:
      - "8085:8085"
    volumes:
      - ./config:/config:ro                     # config.yaml (host + control: section)
      - /etc/resolv.conf:/etc/resolv.conf:ro     # resolve the inverter hostname via the host
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null 'http://127.0.0.1:8085/cgi-bin/switch_inverter_mode.py?action=get_all_slots' || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 15s
